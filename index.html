        Chief Growth Engineer — a fractional <span style="color:#d62828">growth engineer</span>.
      </h1>
      <p style="font-size:20px;margin-top:28px;max-width:640px">
        Chief Growth Engineer (CGE) is the practice of <strong>Rob Louw</strong> — an engineer by training (University of Cape Town) with eight years in performance marketing. CGE builds your <strong>paid acquisition (Google Ads)</strong>, <strong>conversion tracking</strong> and the <strong>data integrity</strong> that ties them together, then hands you a working system your team can run without him.
      </p>

      <h2 style="margin-top:44px;font-size:24px;text-transform:uppercase">What CGE does</h2>
      <ul style="font-size:16px;max-width:680px">
        <li><strong>PPC &amp; paid acquisition</strong> — specialist focus on Google Ads, instrumented on real demand, not vanity metrics. <a href="/services/ppc.html">PPC &amp; paid acquisition →</a></li>
        <li><strong>Data tracking &amp; implementation</strong> — first-party, server-side conversion tracking you own. <a href="/services/tracking.html">Tracking →</a></li>
        <li><strong>Web development</strong> — fast, conversion-focused sites, landing pages and online stores. <a href="/services/web-development.html">Web development →</a></li>
        <li><strong>Optimization &amp; conversion (CRO)</strong> — structured experimentation on your highest-leverage flows. <a href="/services/optimization.html">CRO →</a></li>
        <li><strong>Data &amp; analytics</strong> — funnel, retention, attribution and technical SEO read into decisions. <a href="/services/analytics.html">Analytics →</a></li>
        <li><strong>Marketing automation</strong> — behaviour-triggered lifecycle messaging. <a href="/services/automation.html">Automation →</a></li>
        <li><strong>Business software</strong> — internal tools, dashboards and billing systems. <a href="/services/business-software.html">Business software →</a></li>
      </ul>

      <h2 style="margin-top:36px;font-size:24px;text-transform:uppercase">Selected work</h2>
      <p style="font-size:16px;max-width:680px">Tripled the fleet for a European luxury-transport operator by rebuilding Google Ads around real demand and fixing conversion tracking end-to-end. Taken local brands national with online stores and the systems behind them. Held fractional CMO roles at notable companies across the Middle East. <a href="/work.html">See the work →</a></p>

      <h2 style="margin-top:36px;font-size:24px;text-transform:uppercase">Who it's for</h2>
      <p style="font-size:16px;max-width:680px">Growth-stage businesses with real demand that needs building properly — ecommerce and local brands scaling up, founders formalising paid acquisition, and teams whose tracking and data can no longer be trusted.</p>

      <h2 style="margin-top:36px;font-size:24px;text-transform:uppercase">Engagements</h2>
      <p style="font-size:16px;max-width:680px">Growth Audit (2–4 weeks) · Engine Build (6 months) · PPC Programme (12 months) · CRO Sprint (8–12 weeks) · Fractional CGE (ongoing). Pricing on request.</p>

      <h2 style="margin-top:36px;font-size:24px;text-transform:uppercase">Contact</h2>

        Rob Louw · Cape Town, South Africa (GMT+2), flexible to US &amp; Asia hours.<br>
