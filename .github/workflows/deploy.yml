name: Deploy to Afrihost

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-afrihost
  cancel-in-progress: true

jobs:
  sftp-deploy:
    name: Sync to public_html via SFTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage files (strip dev artefacts)
        run: |
          mkdir -p _dist
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            --exclude='SETUP.sh' \
            --exclude='_dist' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            ./ _dist/
          echo "Staged $(find _dist -type f | wc -l) files."

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Upload via SFTP
        env:
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_DIR:  ${{ secrets.FTP_TARGET_DIR || 'public_html' }}
        run: |
          cat > /tmp/lftp.script <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 3
          set net:timeout 30
          set net:reconnect-interval-base 5
          open -u "$SFTP_USER","$SFTP_PASS" sftp://$SFTP_HOST
          mirror --reverse --delete --parallel=4 --verbose=2 _dist/ $SFTP_DIR/
          bye
          EOF
          lftp -f /tmp/lftp.script
